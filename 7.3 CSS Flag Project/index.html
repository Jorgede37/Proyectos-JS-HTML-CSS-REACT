<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Write your CSS Code here */

    .flag
    {
      background-color: #CE1126;
      width: 900px;
      height: 600px;
      color: white;
      position:relative;
      font-size: 5rem;
    }

    .flag > div
    {
      background-color: #002868;
      height: 300px;
      width: 900px;
      position:absolute;
      top: 150px;
    }

    .flag > p
    {
      position: relative;
      text-align: center;
      top:20px 
    }

    .flag > div > div
    {
      border-radius: 50%;
      width: 200px;
      height: 200px;
      background-color: white;
      position:absolute;
      top: 50px;
      left: 350px;
    }

    .flag > div > div > p
    {
      position:relative;
      bottom: 80px;
      color: BLACK;
      font-size: 5rem;
      text-align: center;
  
    }
    
  </style>
</head>

<!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors 
and CSS specificity instead.
Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
Hint 2: You can use CSS inspection to get the colors from
https://appbrewery.github.io/flag-of-laos/
-->
<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
